<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Muallimuna В· Mode FusГ©e рҹҡҖ</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Naskh+Arabic:wght@700&display=swap" rel="stylesheet">
<style>
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   ROOT & RESET
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
:root {
  --bg: #0A0A1A;
  --card: #14142A;
  --c1: #FF6B6B; --c2: #FFD93D; --c3: #6BCB77;
  --c4: #4D96FF; --c5: #FF922B; --c6: #CC5DE8;
  --white: #FFFFFF;
  --radius: 28px;
}
* { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }
body { font-family: 'Fredoka One', cursive; color: var(--white); user-select: none; }

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   BACKGROUND STARS
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
#stars { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
.star { position: absolute; border-radius: 50%; background: white; animation: twinkle var(--d) infinite ease-in-out; }
@keyframes twinkle {
  0%,100% { opacity: 0.1; transform: scale(1); }
  50% { opacity: 0.8; transform: scale(1.5); }
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   SCREENS
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.screen {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 20px;
  transition: opacity 0.4s ease, transform 0.4s ease;
}
.screen.hidden { opacity: 0; pointer-events: none; transform: scale(0.95); }

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   SCREEN 1 вҖ” ACCUEIL
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
#screen-home {
  gap: 24px;
  background: radial-gradient(ellipse at 50% 30%, #1a0a3a 0%, #0A0A1A 70%);
}

.home-rocket {
  font-size: 90px;
  animation: rocketBounce 1.5s ease-in-out infinite;
  filter: drop-shadow(0 0 30px rgba(255,200,0,0.6));
}
@keyframes rocketBounce {
  0%,100% { transform: translateY(0) rotate(-5deg); }
  50% { transform: translateY(-16px) rotate(5deg); }
}

.home-title {
  text-align: center;
  font-size: clamp(36px, 10vw, 64px);
  background: linear-gradient(135deg, #FFD93D, #FF6B6B, #CC5DE8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  line-height: 1.1;
}

.home-subtitle {
  font-size: 20px;
  color: rgba(255,255,255,0.6);
  text-align: center;
}

.themes-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  width: 100%;
  max-width: 500px;
}

.theme-btn {
  background: var(--card);
  border: 3px solid transparent;
  border-radius: 20px;
  padding: 18px 10px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; flex-direction: column;
  align-items: center; gap: 8px;
  position: relative;
  overflow: hidden;
}
.theme-btn::before {
  content: '';
  position: absolute; inset: 0;
  opacity: 0;
  transition: opacity 0.3s;
  border-radius: 17px;
}
.theme-btn:active { transform: scale(0.93); }
.theme-btn.t1 { border-color: var(--c1); }
.theme-btn.t1::before { background: var(--c1); }
.theme-btn.t2 { border-color: var(--c2); }
.theme-btn.t2::before { background: var(--c2); }
.theme-btn.t3 { border-color: var(--c3); }
.theme-btn.t3::before { background: var(--c3); }
.theme-btn.t4 { border-color: var(--c4); }
.theme-btn.t4::before { background: var(--c4); }
.theme-btn.t5 { border-color: var(--c5); }
.theme-btn.t5::before { background: var(--c5); }
.theme-btn.t6 { border-color: var(--c6); }
.theme-btn.t6::before { background: var(--c6); }
.theme-btn:active::before { opacity: 0.2; }

.theme-emoji { font-size: 36px; position: relative; z-index: 1; }
.theme-label { font-size: 13px; text-align: center; position: relative; z-index: 1; line-height: 1.2; }

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   SCREEN 2 вҖ” JEUX
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
#screen-game { padding: 12px; gap: 10px; justify-content: flex-start; }

/* TOP BAR */
.topbar {
  width: 100%; display: flex; align-items: center;
  justify-content: space-between; padding: 0 4px;
  flex-shrink: 0;
}
.back-btn {
  background: rgba(255,255,255,0.1);
  border: none; border-radius: 50%;
  width: 48px; height: 48px;
  font-size: 22px; cursor: pointer; color: white;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.back-btn:active { background: rgba(255,255,255,0.25); }

.stars-bar {
  display: flex; gap: 6px; align-items: center;
}
.star-icon {
  font-size: 24px;
  transition: transform 0.3s;
}
.star-icon.lit { animation: starPop 0.4s ease; }
@keyframes starPop {
  0% { transform: scale(1); }
  50% { transform: scale(1.6); }
  100% { transform: scale(1); }
}

.session-timer {
  font-size: 14px;
  background: rgba(255,255,255,0.1);
  padding: 6px 14px; border-radius: 20px;
  display: flex; align-items: center; gap: 6px;
}
.timer-bar {
  width: 60px; height: 6px;
  background: rgba(255,255,255,0.2);
  border-radius: 3px; overflow: hidden;
}
.timer-fill {
  height: 100%; border-radius: 3px;
  background: linear-gradient(90deg, #6BCB77, #FFD93D, #FF6B6B);
  transition: width 1s linear;
}

/* WORD CARD */
.word-card {
  width: 100%; max-width: 480px;
  margin: 0 auto;
  background: var(--card);
  border-radius: var(--radius);
  border: 4px solid transparent;
  padding: 22px 20px;
  display: flex; flex-direction: column;
  align-items: center; gap: 10px;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.3s;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
.word-card:active { transform: scale(0.97); }

.word-card-glow {
  position: absolute; inset: 0;
  border-radius: calc(var(--radius) - 4px);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}

.word-emoji-big {
  font-size: clamp(72px, 20vw, 100px);
  line-height: 1;
  animation: emojiFloat 3s ease-in-out infinite;
  filter: drop-shadow(0 8px 20px rgba(0,0,0,0.4));
}
@keyframes emojiFloat {
  0%,100% { transform: translateY(0) rotate(-3deg); }
  50% { transform: translateY(-10px) rotate(3deg); }
}

.word-arabic {
  font-family: 'Noto Naskh Arabic', serif;
  font-size: clamp(48px, 14vw, 72px);
  direction: rtl;
  line-height: 1.2;
  text-shadow: 0 0 30px currentColor;
}

.word-phonetic {
  font-size: clamp(18px, 5vw, 24px);
  opacity: 0.7;
  letter-spacing: 1px;
}

.word-french {
  font-size: clamp(22px, 6vw, 30px);
  opacity: 0.9;
}

.tap-hint {
  font-size: 13px;
  opacity: 0.4;
  display: flex; align-items: center; gap: 6px;
  margin-top: 2px;
}

/* CHOICES */
.choices-label {
  font-size: 15px;
  opacity: 0.5;
  text-align: center;
  flex-shrink: 0;
}

.choices-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  width: 100%; max-width: 480px;
  margin: 0 auto;
  flex-shrink: 0;
}

.choice-btn {
  background: var(--card);
  border: 3px solid rgba(255,255,255,0.15);
  border-radius: 18px;
  padding: 16px 10px;
  cursor: pointer;
  font-family: 'Fredoka One', cursive;
  color: white;
  transition: all 0.2s;
  display: flex; flex-direction: column;
  align-items: center; gap: 6px;
  position: relative; overflow: hidden;
}
.choice-btn:active { transform: scale(0.95); }
.choice-emoji { font-size: 36px; }
.choice-label { font-size: 14px; opacity: 0.8; }

.choice-btn.correct {
  border-color: var(--c3);
  background: rgba(107,203,119,0.2);
  animation: correctPulse 0.6s ease;
}
.choice-btn.wrong {
  border-color: var(--c1);
  background: rgba(255,107,107,0.2);
  animation: wrongShake 0.5s ease;
}
@keyframes correctPulse {
  0% { transform: scale(1); }
  30% { transform: scale(1.08); }
  100% { transform: scale(1); }
}
@keyframes wrongShake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-5px); }
  80% { transform: translateX(5px); }
}

/* NAV BTNS */
.nav-btns {
  display: flex; gap: 10px;
  width: 100%; max-width: 480px;
  margin: 0 auto;
  flex-shrink: 0;
}

.nav-btn {
  flex: 1; padding: 16px;
  border: none; border-radius: 18px;
  font-family: 'Fredoka One', cursive;
  font-size: 18px; cursor: pointer;
  color: white; transition: all 0.2s;
}
.nav-btn:active { transform: scale(0.96); }
.btn-next { background: linear-gradient(135deg, #4D96FF, #6BCB77); }
.btn-repeat { background: rgba(255,255,255,0.12); }

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   SCREEN 3 вҖ” PAUSE / RГүCOMPENSE
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
#screen-reward {
  gap: 20px;
  background: radial-gradient(ellipse at 50% 40%, #1a1a00, #0A0A1A);
}

.reward-trophy {
  font-size: 100px;
  animation: trophySpin 2s ease-in-out infinite;
}
@keyframes trophySpin {
  0%,100% { transform: scale(1) rotate(-5deg); filter: drop-shadow(0 0 20px gold); }
  50% { transform: scale(1.15) rotate(5deg); filter: drop-shadow(0 0 40px gold); }
}

.reward-title {
  font-size: clamp(32px, 10vw, 56px);
  text-align: center;
  background: linear-gradient(90deg, #FFD93D, #FF922B, #FFD93D);
  background-size: 200%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  animation: shimmer 2s linear infinite;
}
@keyframes shimmer { 0% { background-position: 0% } 100% { background-position: 200% } }

.reward-stars {
  display: flex; gap: 12px; font-size: 48px;
}

.reward-score {
  font-size: 20px; opacity: 0.7; text-align: center;
}

.reward-msg {
  font-family: 'Noto Naskh Arabic', serif;
  font-size: 28px; direction: rtl;
  color: #FFD93D;
  text-shadow: 0 0 20px rgba(255,217,61,0.5);
}

.reward-btn {
  padding: 18px 40px;
  border: none; border-radius: 24px;
  font-family: 'Fredoka One', cursive;
  font-size: 22px; cursor: pointer; color: white;
  background: linear-gradient(135deg, #FF6B6B, #CC5DE8);
  transition: transform 0.2s;
  box-shadow: 0 8px 30px rgba(204,93,232,0.4);
}
.reward-btn:active { transform: scale(0.95); }

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   CONFETTI
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
#confetti-canvas {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 999;
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   FEEDBACK OVERLAY
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
#feedback-overlay {
  position: fixed; inset: 0; z-index: 500;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
}
#feedback-overlay.show { opacity: 1; }

.feedback-emoji {
  font-size: 120px;
  animation: feedbackPop 0.6s ease;
  filter: drop-shadow(0 0 40px currentColor);
}
@keyframes feedbackPop {
  0% { transform: scale(0); }
  60% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   BREAK SCREEN
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
#screen-break {
  gap: 24px;
  background: radial-gradient(ellipse at 50% 50%, #001a2e, #0A0A1A);
}
.break-emoji { font-size: 100px; animation: breakBounce 1s ease-in-out infinite; }
@keyframes breakBounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
}
.break-title { font-size: 36px; text-align: center; color: #4D96FF; }
.break-sub { font-size: 18px; opacity: 0.6; text-align: center; max-width: 300px; }
.break-timer-ring {
  width: 100px; height: 100px;
  border-radius: 50%;
  border: 6px solid rgba(255,255,255,0.1);
  border-top-color: #4D96FF;
  animation: spin 1s linear infinite;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.break-count {
  position: absolute;
  font-size: 28px;
  animation: none;
}
.break-ring-wrap { position: relative; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>
<div id="stars"></div>

<!-- FEEDBACK OVERLAY -->
<div id="feedback-overlay">
  <span class="feedback-emoji" id="feedback-emoji">вӯҗ</span>
</div>

<!-- в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     SCREEN 1 : ACCUEIL
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ -->
<div class="screen" id="screen-home">
  <div class="home-rocket">рҹҡҖ</div>

  <div class="themes-grid">

      <span class="theme-emoji">рҹҗҫ</span>
      <span class="theme-label">Les animaux</span>

    <button class="theme-btn t2" onclick="startTheme(1)">
      <span class="theme-emoji">рҹҚҺ</span>
      <span class="theme-label">Les fruits</span>
    </button>
    <button class="theme-btn t3" onclick="startTheme(2)">
      <span class="theme-emoji">рҹ‘ЁвҖҚрҹ‘©вҖҚрҹ‘§</span>
      <span class="theme-label">La famille</span>

    <button class="theme-btn t4" onclick="startTheme(3)">
      <span class="theme-emoji">рҹҺЁ</span>
      <span class="theme-label">Les couleurs</span>

    <button class="theme-btn t5" onclick="startTheme(4)">

      <span class="theme-emoji">рҹҸ </span>

let _bestArabicVoice2 = null;
function getBestArabicVoice() {
  if (_bestArabicVoice2) return _bestArabicVoice2;
  const voices = window.speechSynthesis.getVoices();
  const priority = ['ar-EG','ar-JO','ar-LB','ar-MA','ar-DZ','ar-SA','ar'];
  for (const p of priority) {
    const v = voices.find(v => v.lang.startsWith(p));
    if (v) { _bestArabicVoice2 = v; return v; }
  }
  return voices.find(v => v.lang.startsWith('ar')) || null;
}
window.speechSynthesis.onvoiceschanged = () => { _bestArabicVoice2 = null; };

const WORD_FIXES = {
  'Ш§Щ„Щ„ЩҮ':            ['Ш§Щ„Щ„ЩҮ'],
  'ШЁЩҗШіЩ’Щ…Щҗ Ш§Щ„Щ„ЩҮЩҗ':    ['ШЁШіЩ…', 'Ш§Щ„Щ„ЩҮ'],
  'Ш§Щ„ШӯЩҺЩ…Щ’ШҜЩҸ Щ„ЩҗЩ„ЩҺЩ‘ЩҮЩҗ': ['Ш§Щ„ШӯЩ…ШҜ', 'Щ„Щ„ЩҮ'],
  'ШҘЩҗЩҶЩ’ ШҙЩҺШ§ШЎЩҺ Ш§Щ„Щ„ЩҮЩҸ':['ШҘЩҶ ШҙШ§ШЎ', 'Ш§Щ„Щ„ЩҮ'],
  'Ш§Щ„ШіЩҺЩ‘Щ„ЩҺШ§Щ…ЩҸ Ш№ЩҺЩ„ЩҺЩҠЩ’ЩғЩҸЩ…': ['Ш§Щ„ШіЩ„Ш§Щ…', 'Ш№Щ„ЩҠЩғЩ…'],
};

function speak(text, lang='ar-SA') {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const clean = text.replace(/[рҹҢҹ!вңЁрҹҷҸрҹ’«рҹҢҷвӯҗ]/g,'').trim();
  for (const [key, parts] of Object.entries(WORD_FIXES)) {
    if (clean.includes(key) || text.includes(key)) {
      parts.forEach(part => {
        const u = new SpeechSynthesisUtterance(part);
        const voice = getBestArabicVoice();
        if (voice) u.voice = voice;
        u.lang = voice ? voice.lang : 'ar-SA';
        u.rate = 0.6; u.pitch = 1.0;
        window.speechSynthesis.speak(u);
      });
      return;
    }
  }
  const u = new SpeechSynthesisUtterance(clean || text);
  const voice = getBestArabicVoice();
  if (voice) u.voice = voice;
  u.lang = voice ? voice.lang : lang;
  u.rate = 0.7; u.pitch = 1.1;
  window.speechSynthesis.speak(u);
}

function speakWord() {
  const word = currentWords[currentIndex];
  if (word) {
    pulseCard();
    speak(word.ar);
  }
}

function pulseCard() {
  const card = document.getElementById('word-card');
  card.style.transform = 'scale(1.04)';
  setTimeout(() => card.style.transform = '', 200);
}

// NAVIGATION
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function goHome() {
  clearInterval(sessionTimer);
  clearInterval(breakTimer);
  showScreen('screen-home');
}

function startTheme(idx) {
  currentTheme = idx;
  const theme = THEMES[idx];
  accentColor = theme.color;
  // Shuffle
  currentWords = [...theme.words].sort(() => Math.random() - 0.5);
  currentIndex = 0;
  sessionScore = 0;
  wordsThisSession = 0;
  answered = false;

  // Style accent
  document.getElementById('word-card').style.borderColor = accentColor;
  document.getElementById('card-glow').style.background = `radial-gradient(circle, ${accentColor}22, transparent 70%)`;
  document.getElementById('card-glow').style.opacity = '1';
  document.getElementById('word-arabic').style.color = accentColor;

  showScreen('screen-game');
  renderWord();
  startSessionTimer();
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// SESSION TIMER
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function startSessionTimer() {
  sessionElapsed = 0;
  clearInterval(sessionTimer);
  updateTimerBar();
  sessionTimer = setInterval(() => {
    sessionElapsed++;
    updateTimerBar();
    if (sessionElapsed >= sessionDuration) {
      clearInterval(sessionTimer);
      showReward();
    }
  }, 1000);
}

function updateTimerBar() {
  const pct = Math.max(0, 100 - (sessionElapsed / sessionDuration) * 100);
  document.getElementById('timer-fill').style.width = pct + '%';
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// WORD RENDERING
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function renderWord() {
  if (currentIndex >= currentWords.length) {
    showReward(); return;
  }
  answered = false;
  const word = currentWords[currentIndex];

  document.getElementById('word-emoji').textContent = word.e;
  document.getElementById('word-arabic').textContent = word.ar;
  document.getElementById('word-phonetic').textContent = word.ph;
  document.getElementById('word-french').textContent = word.fr;
  document.getElementById('btn-next').disabled = true;
  document.getElementById('btn-next').style.opacity = '0.4';

  renderChoices(word);

  // Auto-speak after short delay
  setTimeout(() => speak(word.ar), 600);
}

function renderChoices(correct) {
  const grid = document.getElementById('choices-grid');
  grid.innerHTML = '';

  // Pick 3 wrong answers from same theme
  const pool = THEMES[currentTheme].words.filter(w => w.ar !== correct.ar);
  const shuffled = pool.sort(() => Math.random() - 0.5).slice(0, 3);
  const options = [...shuffled, correct].sort(() => Math.random() - 0.5);

  options.forEach(w => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-emoji">${w.e}</span><span class="choice-label">${w.fr}</span>`;
    btn.onclick = () => handleChoice(btn, w, correct);
    grid.appendChild(btn);
  });
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// CHOICE HANDLER
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function handleChoice(btn, chosen, correct) {
  if (answered) return;
  answered = true;

  const allBtns = document.querySelectorAll('.choice-btn');
  allBtns.forEach(b => b.style.pointerEvents = 'none');

  if (chosen.ar === correct.ar) {
    btn.classList.add('correct');
    sessionScore++;
    totalScore++;
    speak(correct.ar);
    showFeedback('вң…', true);
    addStarAnimation();
    wordsThisSession++;
    if (wordsThisSession >= WORDS_BEFORE_BREAK && currentIndex < currentWords.length - 1) {
      wordsThisSession = 0;
      setTimeout(() => showBreak(), 1200);
      return;
    }
  } else {
    btn.classList.add('wrong');
    // Highlight correct
    allBtns.forEach(b => {
      if (b.querySelector('.choice-label').textContent === correct.fr) {
        b.classList.add('correct');
      }
    });
    showFeedback('вқҢ', false);
    speak(correct.ar);
  }

  document.getElementById('btn-next').disabled = false;
  document.getElementById('btn-next').style.opacity = '1';
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// FEEDBACK
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function showFeedback(emoji, good) {
  const ov = document.getElementById('feedback-overlay');
  const em = document.getElementById('feedback-emoji');
  em.textContent = emoji;
  ov.classList.add('show');
  if (good) launchConfetti();
  setTimeout(() => ov.classList.remove('show'), 800);
}

function addStarAnimation() {
  const bar = document.getElementById('stars-bar');
  const stars = bar.querySelectorAll('.star-icon');
  const idx = Math.min(sessionScore - 1, stars.length - 1);
  if (stars[idx]) {
    stars[idx].classList.remove('lit');
    void stars[idx].offsetWidth;
    stars[idx].classList.add('lit');
  }
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// NEXT WORD
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function nextWord() {
  currentIndex++;
  if (currentIndex >= currentWords.length) {
    showReward();
  } else {
    renderWord();
  }
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// BREAK TIME (TDAH: bouger !)
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function showBreak() {
  clearInterval(sessionTimer);
  showScreen('screen-break');
  let count = 5;
  document.getElementById('break-count').textContent = count;
  speak('LГЁve-toi et saute cinq fois !', 'fr-FR');

  breakTimer = setInterval(() => {
    count--;
    document.getElementById('break-count').textContent = count;
    if (count <= 0) {
      clearInterval(breakTimer);
      showScreen('screen-game');
      startSessionTimer();
      nextWord();
    }
  }, 1000);
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// REWARD SCREEN
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function showReward() {
  clearInterval(sessionTimer);
  const total = currentWords.length;
  const pct = Math.round((sessionScore / total) * 100);

  let title, msg, stars;
  if (pct >= 80) {
    title = 'SUPER CHAMPION !'; msg = 'ШЁЩҺШұЩҺШ§ЩҲЩҸЩҲ !'; stars = 'вӯҗвӯҗвӯҗ';
  } else if (pct >= 50) {
    title = 'TRГҲS BIEN !'; msg = 'ШЈЩҺШӯЩ’ШіЩҺЩҶЩ’ШӘЩҺ'; stars = 'вӯҗвӯҗ';
  } else {
    title = 'BRAVO !'; msg = 'ШӘЩҺШ№ЩҺЩ„ЩҺЩ‘Щ…Щ’ШӘЩҺ ЩғЩҺШ«ЩҗЩҠШұШ§ЩӢ'; stars = 'вӯҗ';
  }

  document.getElementById('reward-title').textContent = title;
  document.getElementById('reward-msg').textContent = msg;
  document.getElementById('reward-stars').textContent = stars;
  document.getElementById('reward-score').textContent =
    `${sessionScore} bonne${sessionScore > 1 ? 's' : ''} rГ©ponse${sessionScore > 1 ? 's' : ''} sur ${Math.min(currentIndex + 1, total)} !`;

  showScreen('screen-reward');
  setTimeout(() => {
    launchConfetti();
    speak(msg.replace(/[рҹҢҹ!]/g,''));
  }, 300);
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// CONFETTI
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const pieces = [];
  const colors = ['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF922B','#CC5DE8'];
  for (let i = 0; i < 80; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: -20,
      vx: (Math.random() - 0.5) * 6,
      vy: Math.random() * 4 + 2,
      size: Math.random() * 10 + 5,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * 360,
      rotV: (Math.random() - 0.5) * 10,
      life: 1
    });
  }

  let frame;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    pieces.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.1;
      p.rot += p.rotV;
      p.life -= 0.012;
      if (p.life > 0 && p.y < canvas.height) {
        alive = true;
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI / 180);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size/2, -p.size/4, p.size, p.size/2);
        ctx.restore();
      }
    });
    if (alive) frame = requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  cancelAnimationFrame(frame);
  draw();
}

</script>

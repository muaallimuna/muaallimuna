<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muallimuna · Lettres Difficiles</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;700&family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0F0E17; --surface:#1A1927; --surface2:#222133;
  --border:rgba(255,255,255,0.07); --text:#EEE9FF; --muted:rgba(238,233,255,0.42);
  --c-ghayn:#4ECDC4; --c-3ayn:#FF6B9D; --c-ha:#E8C56D; --c-qaf:#B39DDB;
  --c-hamza:#FFB347; --c-kha:#7DD3FC; --c-dhal:#F9A8D4; --c-dha:#A7F3D0;
  --c-sad:#FCA5A5; --c-dad:#C4B5FD; --c-ta:#FDE68A; --c-haw:#86EFAC;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
header{padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(15,14,23,0.96);backdrop-filter:blur(20px);z-index:60;}
.logo{font-family:'Noto Naskh Arabic',serif;font-size:22px;color:#E8C56D;font-weight:700;}
.htitle{font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
.badge{font-size:11px;font-weight:700;color:var(--muted);background:var(--surface2);padding:4px 12px;border-radius:20px;border:1px solid var(--border);}
.tab-nav{display:flex;padding:0 12px;border-bottom:1px solid var(--border);background:rgba(15,14,23,0.92);backdrop-filter:blur(10px);position:sticky;top:53px;z-index:55;overflow-x:auto;scrollbar-width:none;}
.tab-nav::-webkit-scrollbar{display:none;}
.tab-btn{flex-shrink:0;padding:11px 14px;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.tab-btn .tar{font-family:'Noto Naskh Arabic',serif;font-size:16px;direction:rtl;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--text);}
.tab-btn[data-l="ghayn"].active{color:var(--c-ghayn);border-bottom-color:var(--c-ghayn);}
.tab-btn[data-l="3ayn"].active{color:var(--c-3ayn);border-bottom-color:var(--c-3ayn);}
.tab-btn[data-l="ha"].active{color:var(--c-ha);border-bottom-color:var(--c-ha);}
.tab-btn[data-l="qaf"].active{color:var(--c-qaf);border-bottom-color:var(--c-qaf);}
.tab-btn[data-l="hamza"].active{color:var(--c-hamza);border-bottom-color:var(--c-hamza);}
.tab-btn[data-l="kha"].active{color:var(--c-kha);border-bottom-color:var(--c-kha);}
.tab-btn[data-l="dhal"].active{color:var(--c-dhal);border-bottom-color:var(--c-dhal);}
.tab-btn[data-l="dha"].active{color:var(--c-dha);border-bottom-color:var(--c-dha);}
.tab-btn[data-l="sad"].active{color:var(--c-sad);border-bottom-color:var(--c-sad);}
.tab-btn[data-l="dad"].active{color:var(--c-dad);border-bottom-color:var(--c-dad);}
.tab-btn[data-l="ta"].active{color:var(--c-ta);border-bottom-color:var(--c-ta);}
.tab-btn[data-l="haw"].active{color:var(--c-haw);border-bottom-color:var(--c-haw);}
main{max-width:960px;margin:0 auto;padding:28px 18px 80px;}
.section{display:none;}
.section.active{display:block;animation:fi .35s ease;}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.hero{display:flex;align-items:center;gap:22px;margin-bottom:22px;padding:24px 28px;border-radius:18px;border:1px solid var(--border);background:var(--surface);}
.hero-letter{font-family:'Noto Naskh Arabic',serif;font-size:82px;font-weight:700;direction:rtl;line-height:1;flex-shrink:0;}
.hero-info{flex:1;}
.hero-name-ar{font-family:'Noto Naskh Arabic',serif;font-size:17px;font-weight:700;direction:rtl;display:block;margin-bottom:2px;color:var(--muted);}
.hero-name-fr{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;display:block;margin-bottom:7px;}
.hero-desc{font-size:12px;color:var(--muted);line-height:1.7;max-width:420px;}
.hero-forms{display:flex;gap:6px;margin-top:11px;flex-wrap:wrap;}
.fp{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:4px 10px;text-align:center;}
.fp-l{font-size:8px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:2px;}
.fp-a{font-family:'Noto Naskh Arabic',serif;font-size:17px;direction:rtl;display:block;}
.tip{border-radius:11px;padding:11px 15px;font-size:12px;line-height:1.7;font-weight:500;margin-bottom:20px;border:1px solid;display:flex;gap:9px;}
.tip-icon{font-size:15px;flex-shrink:0;margin-top:1px;}
.slabel{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:3px;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.slabel::after{content:'';flex:1;height:1px;background:var(--border);}
.nuance-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:9px;margin-bottom:26px;}
.ncard{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:14px 16px;}
.ncard-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:9px;}
.ncard-row{display:flex;gap:9px;align-items:flex-start;padding:5px 0;border-bottom:1px solid var(--border);}
.ncard-row:last-child{border-bottom:none;padding-bottom:0;}
.ncard-ar{font-family:'Noto Naskh Arabic',serif;font-size:19px;direction:rtl;flex-shrink:0;min-width:65px;text-align:right;}
.ncard-ph{font-size:11px;font-weight:700;display:block;}
.ncard-def{font-size:11px;color:var(--muted);display:block;line-height:1.5;}
.wgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:9px;margin-bottom:28px;}
.wcard{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:14px 16px 12px;display:flex;flex-direction:column;gap:3px;transition:all .2s;}
.wcard:hover{transform:translateY(-2px);}
.wcard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:2px;}
.wcard-ar{font-family:'Noto Naskh Arabic',serif;font-size:25px;font-weight:500;direction:rtl;line-height:1.35;color:var(--text);}
.wcard-emoji{font-size:19px;flex-shrink:0;margin-top:3px;}
.wcard-ph{font-size:11px;font-weight:700;letter-spacing:.2px;}
.wcard-fr{font-size:11px;color:var(--muted);font-weight:500;}
.wcard-meta{display:flex;flex-direction:column;gap:3px;margin-top:7px;padding-top:7px;border-top:1px solid var(--border);}
.meta-row{display:flex;align-items:baseline;gap:6px;}
.meta-tag{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);flex-shrink:0;min-width:28px;}
.meta-ar{font-family:'Noto Naskh Arabic',serif;font-size:15px;direction:rtl;color:rgba(238,233,255,0.6);}
.meta-ph{font-size:9px;color:var(--muted);font-weight:600;}
.wnote{background:var(--surface2);border-radius:8px;padding:7px 10px;margin-top:5px;font-size:10px;line-height:1.6;color:rgba(238,233,255,0.55);}

/* Per-letter accent */
.ghayn .wcard-ph,.ghayn .hero-name-fr,.ghayn .hero-letter{color:var(--c-ghayn);}
.ghayn .wcard:hover{border-color:rgba(78,205,196,.3);box-shadow:0 5px 20px rgba(78,205,196,.07);}
.ghayn .tip{background:rgba(78,205,196,.07);border-color:rgba(78,205,196,.2);color:rgba(78,205,196,.9);}
.c3ayn .wcard-ph,.c3ayn .hero-name-fr,.c3ayn .hero-letter{color:var(--c-3ayn);}
.c3ayn .wcard:hover{border-color:rgba(255,107,157,.3);box-shadow:0 5px 20px rgba(255,107,157,.07);}
.c3ayn .tip{background:rgba(255,107,157,.07);border-color:rgba(255,107,157,.2);color:rgba(255,107,157,.9);}
.ha .wcard-ph,.ha .hero-name-fr,.ha .hero-letter{color:var(--c-ha);}
.ha .wcard:hover{border-color:rgba(232,197,109,.3);box-shadow:0 5px 20px rgba(232,197,109,.07);}
.ha .tip{background:rgba(232,197,109,.07);border-color:rgba(232,197,109,.2);color:rgba(232,197,109,.9);}
.qaf .wcard-ph,.qaf .hero-name-fr,.qaf .hero-letter{color:var(--c-qaf);}
.qaf .wcard:hover{border-color:rgba(179,157,219,.3);box-shadow:0 5px 20px rgba(179,157,219,.07);}
.qaf .tip{background:rgba(179,157,219,.07);border-color:rgba(179,157,219,.2);color:rgba(179,157,219,.9);}
.hamza .wcard-ph,.hamza .hero-name-fr,.hamza .hero-letter{color:var(--c-hamza);}
.hamza .wcard:hover{border-color:rgba(255,179,71,.3);box-shadow:0 5px 20px rgba(255,179,71,.07);}
.hamza .tip{background:rgba(255,179,71,.07);border-color:rgba(255,179,71,.2);color:rgba(255,179,71,.9);}
.kha .wcard-ph,.kha .hero-name-fr,.kha .hero-letter{color:var(--c-kha);}
.kha .wcard:hover{border-color:rgba(125,211,252,.3);box-shadow:0 5px 20px rgba(125,211,252,.07);}
.kha .tip{background:rgba(125,211,252,.07);border-color:rgba(125,211,252,.2);color:rgba(125,211,252,.9);}
.dhal .wcard-ph,.dhal .hero-name-fr,.dhal .hero-letter{color:var(--c-dhal);}
.dhal .wcard:hover{border-color:rgba(249,168,212,.3);box-shadow:0 5px 20px rgba(249,168,212,.07);}
.dhal .tip{background:rgba(249,168,212,.07);border-color:rgba(249,168,212,.2);color:rgba(249,168,212,.9);}
.dha .wcard-ph,.dha .hero-name-fr,.dha .hero-letter{color:var(--c-dha);}
.dha .wcard:hover{border-color:rgba(167,243,208,.3);box-shadow:0 5px 20px rgba(167,243,208,.07);}
.dha .tip{background:rgba(167,243,208,.07);border-color:rgba(167,243,208,.2);color:rgba(167,243,208,.9);}
.sad .wcard-ph,.sad .hero-name-fr,.sad .hero-letter{color:var(--c-sad);}
.sad .wcard:hover{border-color:rgba(252,165,165,.3);box-shadow:0 5px 20px rgba(252,165,165,.07);}
.sad .tip{background:rgba(252,165,165,.07);border-color:rgba(252,165,165,.2);color:rgba(252,165,165,.9);}
.dad .wcard-ph,.dad .hero-name-fr,.dad .hero-letter{color:var(--c-dad);}
.dad .wcard:hover{border-color:rgba(196,181,253,.3);box-shadow:0 5px 20px rgba(196,181,253,.07);}
.dad .tip{background:rgba(196,181,253,.07);border-color:rgba(196,181,253,.2);color:rgba(196,181,253,.9);}
.ta .wcard-ph,.ta .hero-name-fr,.ta .hero-letter{color:var(--c-ta);}
.ta .wcard:hover{border-color:rgba(253,230,138,.3);box-shadow:0 5px 20px rgba(253,230,138,.07);}
.ta .tip{background:rgba(253,230,138,.07);border-color:rgba(253,230,138,.2);color:rgba(253,230,138,.9);}
.haw .wcard-ph,.haw .hero-name-fr,.haw .hero-letter{color:var(--c-haw);}
.haw .wcard:hover{border-color:rgba(134,239,172,.3);box-shadow:0 5px 20px rgba(134,239,172,.07);}
.haw .tip{background:rgba(134,239,172,.07);border-color:rgba(134,239,172,.2);color:rgba(134,239,172,.9);}
</style>
</head>

function buildSection(l){
  const sec=document.createElement('div');
  sec.className=`section ${l.cls}`;
  sec.id=`sec-${l.id}`;
  const formsHTML=l.forms.map(f=>`<div class="fp"><span class="fp-l">${f.l}</span><span class="fp-a">${f.a}</span></div>`).join('');
  let html=`
    <div class="hero">
      <div class="hero-letter">${l.ar}</div>
      <div class="hero-info">
        <span class="hero-name-ar">${l.nameAr}</span>
        <span class="hero-name-fr">${l.nameFr}</span>
        <p class="hero-desc">${l.desc}</p>
        <div class="hero-forms">${formsHTML}</div>
      </div>
    </div>
    <div class="tip"><span class="tip-icon">🔊</span><span>${l.tip}</span></div>`;
  if(l.nuances&&l.nuances.length){
    html+=`<div class="slabel">Nuances & distinctions</div><div class="nuance-grid">`;
    l.nuances.forEach(n=>{
      const rows=n.rows.map(r=>`<div class="ncard-row"><span class="ncard-ar">${r.ar}</span><div><span class="ncard-ph">${r.ph}</span><span class="ncard-def">${r.def}</span></div></div>`).join('');
      html+=`<div class="ncard"><div class="ncard-title">${n.title}</div>${rows}</div>`;
    });
    html+=`</div>`;
  }
  html+=`<div class="slabel">Vocabulaire · ${l.nameAr}</div><div class="wgrid">`;
  l.words.forEach(w=>{
    let meta='';
    if(w.fem) meta+=`<div class="meta-row"><span class="meta-tag">fém.</span><span class="meta-ar">${w.fem}</span><span class="meta-ph">${w.femph||''}</span></div>`;
    if(w.masc) meta+=`<div class="meta-row"><span class="meta-tag">masc.</span><span class="meta-ar">${w.masc}</span><span class="meta-ph">${w.mascph||''}</span></div>`;
    if(w.sing) meta+=`<div class="meta-row"><span class="meta-tag">sing.</span><span class="meta-ar">${w.sing}</span><span class="meta-ph">${w.singph||''}</span></div>`;
    if(w.pl)   meta+=`<div class="meta-row"><span class="meta-tag">plur.</span><span class="meta-ar">${w.pl}</span><span class="meta-ph">${w.plph||''}</span></div>`;
    if(w.adj)  meta+=`<div class="meta-row"><span class="meta-tag">adj.</span><span class="meta-ar">${w.adj}</span><span class="meta-ph">${w.adjph||''}</span></div>`;
    const metaBlock=meta?`<div class="wcard-meta">${meta}</div>`:'';
    const noteBlock=w.note?`<div class="wnote">💡 ${w.note}</div>`:'';
    html+=`<div class="wcard">
      <div class="wcard-top"><span class="wcard-emoji">${w.e||''}</span><span class="wcard-ar">${w.ar}</span></div>
      <span class="wcard-ph">${w.ph}</span>
      <span class="wcard-fr">${w.fr}</span>
      ${metaBlock}${noteBlock}
    </div>`;
  });
  html+=`</div>`;
  sec.innerHTML=html;
  return sec;
}

const main=document.getElementById('main');
D.forEach(l=>main.appendChild(buildSection(l)));
document.getElementById('sec-ghayn').classList.add('active');

function show(id,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  btn.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
